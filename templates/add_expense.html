{% extends "base.html" %}

{% block title %}Add Expense — Spendly{% endblock %}

{% block content %}

<section class="auth-section">
    <div class="auth-container">

        <div class="auth-header">
            <h1 class="auth-title">Add Expense</h1>
            <p class="auth-subtitle">Log a new transaction</p>
        </div>

        <div class="auth-card">
            {% if error %}
            <div class="auth-error">{{ error }}</div>
            {% endif %}

            <form method="POST" action="/expenses/add">
                <div class="form-group">
                    <label for="amount">Amount</label>
                    <input type="number" id="amount" name="amount" step="0.01" min="0"
                           class="form-input" placeholder="e.g. 250.00"
                           value="{{ form_data.amount if form_data else '' }}" required>
                </div>
                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category" name="category" class="form-input" required>
                        <option value="" disabled{% if not form_data or not form_data.category %} selected{% endif %}>Select a category</option>
                        {% for cat in ["Food", "Transport", "Bills", "Health", "Entertainment", "Shopping", "Other"] %}
                        <option value="{{ cat }}"{% if form_data and form_data.category == cat %} selected{% endif %}>{{ cat }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label for="date">Date</label>
                    <input type="date" id="date" name="date"
                           class="form-input"
                           value="{{ form_data.date if form_data else '' }}" required>
                </div>
                <div class="form-group">
                    <label for="description">Description <span style="color: var(--ink-faint); font-weight: 400;">(optional)</span></label>
                    <textarea id="description" name="description" rows="2"
                              class="form-input" placeholder="e.g. Groceries at Big Bazaar">{{ form_data.description if form_data else '' }}</textarea>
                </div>
                <button type="submit" class="btn-submit">Add Expense</button>
            </form>
        </div>

        <p class="auth-switch">
            <a href="{{ url_for('profile') }}">&larr; Back to Profile</a>
        </p>

    </div>
</section>

{% endblock %}
