{% extends "base.html" %}
{% block title %}Add Expense — Spendly{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="auth-container">
        <div class="auth-header">
            <h1 class="auth-title">Add Expense</h1>
        </div>

        <div class="auth-card">
            {% if error %}
            <div class="auth-error">{{ error }}</div>
            {% endif %}

            <form method="POST" action="{{ url_for('add_expense_route') }}">
                <div class="form-group">
                    <label for="amount">Amount (₹)</label>
                    <input type="number" class="form-input" id="amount" name="amount"
                           step="0.01" min="0.01" required
                           value="{{ form_data.amount if form_data else '' }}">
                </div>

                <div class="form-group">
                    <label for="category">Category</label>
                    <select class="form-input" id="category" name="category" required>
                        <option value="">Select a category</option>
                        {% for cat in categories %}
                        <option value="{{ cat }}"
                          {%- if form_data and form_data.category == cat %} selected{% endif %}>
                            {{ cat }}
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group">
                    <label for="date">Date</label>
                    <input type="date" class="form-input" id="date" name="date" required
                           value="{{ form_data.date if form_data else '' }}">
                </div>

                <div class="form-group">
                    <label for="description">Description <span class="optional">(optional)</span></label>
                    <input type="text" class="form-input" id="description" name="description" maxlength="200"
                           value="{{ form_data.description if form_data else '' }}">
                </div>

                <button type="submit" class="btn-submit">Add Expense</button>
            </form>
        </div>

        <div class="auth-switch">
            <a href="{{ url_for('profile') }}">← Cancel and go back to profile</a>
        </div>
    </div>
</section>
{% endblock %}
